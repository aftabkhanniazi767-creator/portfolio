<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title Sameer Khan Ultra 3D Portfolio</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#050816;
    color:white;
    overflow-x:hidden;
}

/* 🌌 Animated background glow */
.bg{
    position:fixed;
    width:100%;
    height:100%;
    background:radial-gradient(circle at 20% 20%, #4f46e5, transparent 40%),
               radial-gradient(circle at 80% 30%, #06b6d4, transparent 40%),
               radial-gradient(circle at 50% 80%, #22c55e, transparent 40%);
    filter:blur(80px);
    z-index:-1;
    animation:move 10s infinite alternate;
}

@keyframes move{
    0%{transform:translate(0,0);}
    100%{transform:translate(30px,20px);}
}

/* HEADER */
.header{
    text-align:center;
    padding:60px 20px;
    transform-style:preserve-3d;
}

.header h1{
    font-size:38px;
    text-shadow:0 0 20px #06b6d4;
}

.header p{
    opacity:0.8;
}

/* CARD */
.card{
    width:90%;
    max-width:500px;
    margin:20px auto;
    padding:20px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
    border-radius:15px;
    border:1px solid rgba(255,255,255,0.2);
    box-shadow:0 10px 40px rgba(0,0,0,0.5);
    transition:0.4s;
    transform:perspective(1000px);
}

.card:hover{
    transform:perspective(1000px) rotateY(10deg) rotateX(10deg) scale(1.05);
    box-shadow:0 20px 60px rgba(0,255,255,0.3);
}

/* BUTTON */
.btn{
    display:inline-block;
    margin-top:10px;
    padding:12px 18px;
    background:#22c55e;
    color:white;
    text-decoration:none;
    border-radius:10px;
    transition:0.3s;
    box-shadow:0 0 15px #22c55e;
}

.btn:hover{
    transform:scale(1.1);
    box-shadow:0 0 25px #22c55e;
}
</style>

</head>

<body>

<div class="bg"></div>

<div class="header">
    <h1>👋 I am Aftab</h1>
    <p>Ultra 3D Web Developer Portfolio</p>
</div>

<div class="card">
    <h2>🔥 About Me</h2>
    <p>I am learning modern web development and building 3D animated websites.</p>
</div>

<div class="card">
    <h2>⚡ Skills</h2>
    <p>HTML • CSS • Python • GitHub • JavaScript (learning)</p>
</div>

<div class="card">
    <h2>🚀 Projects</h2>
    <p>✔ Portfolio Website</p>
    <p>✔ Animated UI Designs</p>
</div>

<div class="card">
    <h2>📞 Contact</h2>

    <a class="btn"
       href="https://wa.me/923455836749"
       target="_blank">
       💬 WhatsApp Me
    </a>
</div>

</body>
</html>
