<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Age Calculator</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(-45deg,#0f172a,#1e3a8a,#2563eb,#0f172a);
    background-size:400% 400%;
    animation:bgMove 12s ease infinite;
    overflow:hidden;
}

@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.container{
    width:90%;
    max-width:450px;
    padding:35px;
    border-radius:25px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.15);
    box-shadow:
    0 20px 50px rgba(0,0,0,0.4),
    0 0 30px rgba(59,130,246,0.5);
    text-align:center;
    transition:0.5s;
}

.container:hover{
    transform:translateY(-10px) scale(1.02);
    box-shadow:
    0 30px 70px rgba(0,0,0,0.5),
    0 0 50px rgba(96,165,250,0.8);
}

h1{
    color:#fff;
    margin-bottom:25px;
    font-size:32px;
    text-shadow:0 0 15px #60a5fa;
}

.input-box{
    margin:20px 0;
}

input{
    width:100%;
    padding:15px;
    border:none;
    border-radius:15px;
    outline:none;
    font-size:16px;
    background:rgba(255,255,255,0.12);
    color:white;
    transition:0.3s;
}

input:hover,
input:focus{
    transform:scale(1.03);
    box-shadow:0 0 20px rgba(96,165,250,.6);
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:15px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    color:white;
    background:linear-gradient(45deg,#2563eb,#60a5fa);
    transition:.4s;
}

button:hover{
    transform:translateY(-5px);
    box-shadow:
    0 15px 30px rgba(37,99,235,.5),
    0 0 30px rgba(96,165,250,.8);
}

.result{
    margin-top:25px;
    color:white;
    display:none;
    animation:fadeIn .7s ease;
}

.result h2{
    margin-bottom:10px;
}

.result p{
    font-size:20px;
    font-weight:bold;
    color:#93c5fd;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.circle{
    position:absolute;
    border-radius:50%;
    background:rgba(255,255,255,0.08);
    animation:float 10s linear infinite;
}

.circle:nth-child(1){
    width:120px;
    height:120px;
    top:10%;
    left:10%;
}

.circle:nth-child(2){
    width:180px;
    height:180px;
    bottom:10%;
    right:10%;
}

@keyframes float{
    0%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-30px);
    }
    100%{
        transform:translateY(0);
    }
}
</style>
</head>

<body>

<div class="circle"></div>
<div class="circle"></div>

<div class="container">

    <h1>Age Calculator</h1>

    <div class="input-box">
        <input type="date" id="dob">
    </div>

    <button onclick="calculateAge()">
        Calculate Age
    </button>

    <div class="result" id="result">
        <h2>Your Age</h2>
        <p id="ageText"></p>
    </div>

</div>

<script>
function calculateAge(){

    let dob = document.getElementById("dob").value;

    if(!dob){
        alert("Please select your date of birth");
        return;
    }

    let birthDate = new Date(dob);
    let today = new Date();

    let years =
    today.getFullYear() -
    birthDate.getFullYear();

    let months =
    today.getMonth() -
    birthDate.getMonth();

    let days =
    today.getDate() -
    birthDate.getDate();

    if(days < 0){
        months--;

        let lastMonthDays =
        new Date(
            today.getFullYear(),
            today.getMonth(),
            0
        ).getDate();

        days += lastMonthDays;
    }

    if(months < 0){
        years--;
        months += 12;
    }

    document.getElementById("result").style.display = "block";

    document.getElementById("ageText").innerHTML =
    years + " Years, " +
    months + " Months, " +
    days + " Days";
}
</script>

</body>
        </html>
